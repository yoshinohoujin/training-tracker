<!DOCTYPE html>
<!-- v10 -->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新人教育進捗管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f4fa; --surface: #ffffff; --surface2: #f5f7fc;
    --border: #dde3f0; --accent: #2563eb; --accent2: #7c3aed;
    --green: #16a34a; --yellow: #d97706; --red: #dc2626;
    --text: #1e2340; --text2: #4b5680; --text3: #8b96b8;
    --radius: 10px; --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); font-size: 1rem; min-height: 100vh; }

  .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px 32px; width: 100%; max-width: 400px; box-shadow: 0 4px 24px rgba(30,35,64,0.08); }
  .login-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 6px; }
  .login-sub { font-size: 0.8rem; color: var(--text3); margin-bottom: 28px; }
  .login-field { margin-bottom: 16px; }
  .login-label { font-size: 0.75rem; font-weight: 600; color: var(--text2); margin-bottom: 6px; display: block; }
  .login-input { width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 1rem; font-family: 'Noto Sans JP', sans-serif; background: var(--surface2); color: var(--text); }
  .login-input:focus { outline: none; border-color: var(--accent); }
  .login-btn { width: 100%; padding: 14px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 1rem; font-weight: 600; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; margin-top: 8px; }
  .login-btn:disabled { background: var(--text3); }
  .login-error { color: var(--red); font-size: 0.8rem; margin-top: 10px; text-align: center; }

  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 16px; display: flex; align-items: center; justify-content: space-between; height: 52px; position: sticky; top: 0; z-index: 100; }
  .header-title { font-size: 0.95rem; font-weight: 700; }
  .header-title span { color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .role-badge { font-size: 0.7rem; padding: 3px 8px; border-radius: 20px; font-weight: 500; white-space: nowrap; }
  .role-trainer { background: rgba(37,99,235,0.1); color: var(--accent); border: 1px solid rgba(37,99,235,0.2); }
  .role-manager { background: rgba(124,58,237,0.1); color: var(--accent2); border: 1px solid rgba(124,58,237,0.2); }
  .role-new { background: rgba(22,163,74,0.1); color: var(--green); border: 1px solid rgba(22,163,74,0.2); }
  .logout-btn { font-size: 0.75rem; padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; font-family: 'Noto Sans JP', sans-serif; }

  .app-layout { display: flex; min-height: calc(100vh - 52px); }
  .sidebar { width: 200px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); padding: 16px 12px; position: sticky; top: 52px; height: calc(100vh - 52px); overflow-y: auto; }
  .sidebar-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; color: var(--text3); text-transform: uppercase; padding: 0 8px; margin-bottom: 8px; display: block; }
  .sidebar-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 6px; cursor: pointer; color: var(--text2); font-size: 12px; transition: all 0.15s; }
  .sidebar-item:hover { background: var(--surface2); color: var(--text); }
  .sidebar-item.active { background: rgba(37,99,235,0.08); color: var(--accent); }
  .sidebar-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
  .sidebar-item.active .sidebar-dot { background: var(--accent); }
  .sidebar-progress { margin-left: auto; font-size: 10px; color: var(--text3); }
  .sidebar-item.active .sidebar-progress { color: var(--accent); }
  .main-content { flex: 1; overflow-y: auto; }
  .main { padding: 16px; max-width: 960px; margin: 0 auto; }

  .trainee-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .trainee-label { font-size: 0.85rem; color: var(--text2); }
  .trainee-btn { padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text2); font-size: 0.85rem; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; }
  .trainee-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500; }

  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
  .section-title { font-size: 1.1rem; font-weight: 700; }
  .section-stats { display: flex; gap: 16px; }
  .stat-item { text-align: center; }
  .stat-num { font-size: 1.2rem; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 0.65rem; color: var(--text3); }
  .progress-wrap { background: var(--surface2); border-radius: 4px; height: 8px; margin-bottom: 16px; overflow: hidden; border: 1px solid var(--border); }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 4px; transition: width 0.5s; }

  .legend { display: flex; gap: 10px; flex-wrap: wrap; padding: 10px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); font-size: 0.7rem; color: var(--text2); margin-bottom: 16px; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

  .category-block { margin-bottom: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: 0 1px 4px rgba(30,35,64,0.06); }
  .category-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; cursor: pointer; user-select: none; border-bottom: 1px solid var(--border); }
  .category-head-left { display: flex; align-items: center; gap: 8px; }
  .category-name { font-size: 0.95rem; font-weight: 600; }
  .category-count { font-size: 0.75rem; color: var(--text3); }
  .category-chevron { color: var(--text3); transition: transform 0.2s; font-size: 0.75rem; }
  .category-chevron.open { transform: rotate(180deg); }
  .category-mini-bar { width: 60px; background: var(--surface2); border-radius: 3px; height: 4px; overflow: hidden; }
  .category-mini-fill { height: 100%; background: var(--accent); border-radius: 3px; }

  .item-row { padding: 14px 16px; border-bottom: 1px solid var(--border); }
  .item-row:last-child { border-bottom: none; }
  .item-row-header { display: none; }
  .item-name-wrap { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .item-name { font-size: 0.9rem; font-weight: 500; }
  .status-badge { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: 20px; font-size: 0.65rem; font-weight: 600; white-space: nowrap; }
  .item-checks { display: flex; gap: 3px; overflow: hidden; }
  .check-col { flex: 1; background: var(--surface2); border-radius: 8px; padding: 8px 4px; min-width: 0; overflow: hidden; }
  .taught-check { display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; margin-bottom: 8px; }
  .check-box { width: 36px; height: 36px; border-radius: 8px; border: 2px solid var(--border); background: var(--surface); display: flex; align-items: center; justify-content: center; font-size: 1rem; transition: all 0.15s; flex-shrink: 0; }
  .taught-check.checked .check-box { background: var(--accent); border-color: var(--accent); color: #fff; }
  .taught-check.checked.retaught .check-box { background: var(--accent2); border-color: var(--accent2); }
  .taught-date-label { font-size: 0.75rem; color: var(--text3); }
  .taught-check.checked .taught-date-label { color: var(--accent); font-weight: 500; }
  .taught-check.checked.retaught .taught-date-label { color: var(--accent2); }
  .grade-select { display: flex; gap: 4px; flex-wrap: nowrap; }
  .grade-btn { width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); font-size: 0.85rem; font-weight: 700; cursor: pointer; color: var(--text3); font-family: 'Noto Sans JP', sans-serif; }
  .grade-btn.active-A { background: rgba(22,163,74,0.15); border-color: var(--green); color: var(--green); }
  .grade-btn.active-B { background: rgba(37,99,235,0.15); border-color: var(--accent); color: var(--accent); }
  .grade-btn.active-C { background: rgba(217,119,6,0.15); border-color: var(--yellow); color: var(--yellow); }
  .grade-btn.active-D { background: rgba(220,38,38,0.15); border-color: var(--red); color: var(--red); }

  .overview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .overview-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; box-shadow: 0 1px 4px rgba(30,35,64,0.06); }
  .overview-card-name { font-size: 0.95rem; font-weight: 600; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
  .overview-pct-big { font-size: 1.2rem; font-weight: 700; color: var(--accent); }
  .overview-sections { display: flex; flex-direction: column; gap: 6px; }
  .overview-row { display: flex; align-items: center; gap: 8px; }
  .overview-name { font-size: 0.7rem; color: var(--text2); width: 80px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .overview-bar { flex: 1; height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .overview-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; }
  .overview-pct { font-size: 0.7rem; color: var(--text3); width: 28px; text-align: right; }

  .view-tabs { display: flex; gap: 4px; margin-bottom: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px; width: fit-content; }
  .view-tab { padding: 8px 16px; border-radius: 7px; border: none; background: transparent; color: var(--text2); font-size: 0.85rem; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; }
  .view-tab.active { background: var(--accent); color: #fff; font-weight: 500; }

  .loading { text-align: center; padding: 60px 20px; color: var(--text3); font-size: 0.85rem; }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .toast { position: fixed; bottom: 20px; right: 16px; left: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px; font-size: 0.85rem; color: var(--text); opacity: 0; transform: translateY(10px); transition: all 0.2s; z-index: 999; pointer-events: none; box-shadow: 0 4px 16px rgba(30,35,64,0.1); text-align: center; max-width: 400px; margin: 0 auto; }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { border-left: 3px solid var(--green); }
  .toast.error { border-left: 3px solid var(--red); }

  /* ADMIN */
  .admin-tabs { display: flex; gap: 4px; margin-bottom: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px; width: fit-content; }
  .admin-tab { padding: 8px 16px; border-radius: 7px; border: none; background: transparent; color: var(--text2); font-size: 0.85rem; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; }
  .admin-tab.active { background: var(--accent2); color: #fff; font-weight: 500; }
  .admin-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 16px; }
  .admin-section-head { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: var(--surface2); border-bottom: 1px solid var(--border); }
  .admin-section-title { font-size: 0.9rem; font-weight: 600; }
  .admin-item-row { display: flex; align-items: center; gap: 8px; padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: 0.85rem; transition: background 0.1s; }
  .admin-item-row:last-child { border-bottom: none; }
  .admin-item-name { flex: 1; min-width: 0; }
  .admin-btn { padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border); background: transparent; font-size: 0.75rem; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; color: var(--text2); white-space: nowrap; flex-shrink: 0; }
  .admin-btn:hover { background: var(--surface2); }
  .admin-btn.danger { color: var(--red); border-color: rgba(220,38,38,0.3); }
  .admin-btn.danger:hover { background: rgba(220,38,38,0.05); }
  .admin-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .admin-btn.primary:hover { opacity: 0.9; }
  .admin-btn.success { color: var(--green); border-color: rgba(22,163,74,0.3); }
  .admin-input { padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 0.85rem; font-family: 'Noto Sans JP', sans-serif; background: var(--surface2); color: var(--text); }
  .admin-input:focus { outline: none; border-color: var(--accent); }
  .admin-select { padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 0.85rem; font-family: 'Noto Sans JP', sans-serif; background: var(--surface2); color: var(--text); }
  .admin-form { display: flex; gap: 8px; flex-wrap: wrap; padding: 12px 16px; background: var(--surface2); border-top: 1px solid var(--border); align-items: center; }
  .admin-hint { font-size: 0.7rem; color: var(--text3); margin-top: 4px; }

  /* STAFF TABLE */
  .staff-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  .staff-table th { padding: 8px 12px; background: var(--surface2); color: var(--text3); font-size: 0.7rem; font-weight: 700; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
  .staff-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .staff-table tr:last-child td { border-bottom: none; }
  .staff-table tr:hover td { background: var(--surface2); }
  .staff-table .btn-group { display: flex; gap: 4px; flex-wrap: wrap; }

  /* DRAG & DROP */
  .drag-handle { cursor: grab; color: var(--text3); padding: 0 4px; font-size: 1rem; flex-shrink: 0; user-select: none; }
  .drag-handle:active { cursor: grabbing; }
  .dragging { opacity: 0.4; }
  .drag-over-top { border-top: 2px solid var(--accent) !important; }
  .drag-over-bottom { border-bottom: 2px solid var(--accent) !important; }

  /* BACK BTN */
  .back-btn { display: inline-flex; align-items: center; gap: 6px; margin-bottom: 16px; padding: 8px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface); color: var(--text2); font-size: 0.85rem; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; }
  .back-btn:hover { background: var(--surface2); }

  /* PC LAYOUT */
  @media (min-width: 600px) {
    .sidebar { display: block; }
    .item-row { display: grid; grid-template-columns: 1fr 240px 240px auto; align-items: center; padding: 10px 16px; gap: 12px; }
    .item-row-header { display: grid; grid-template-columns: 1fr 240px 240px auto; padding: 8px 16px; gap: 12px; background: var(--surface2); border-bottom: 1px solid var(--border); font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text3); text-transform: uppercase; }
    .item-checks { display: contents; }
    .check-col { display: flex; align-items: center; gap: 10px; background: transparent; padding: 0; border-radius: 0; min-width: 0; overflow: visible; }
    .taught-check { margin-bottom: 0; }
    .check-box { width: 30px; height: 30px; font-size: 0.95rem; }
    .grade-select { gap: 4px; flex-wrap: nowrap; }
    .grade-btn { width: 30px; height: 30px; font-size: 0.78rem; }
    .taught-date-label { white-space: nowrap; }
  }
  @media (max-width: 599px) {
    .sidebar { display: none; }
    .overview-grid { grid-template-columns: 1fr; }
    .view-tabs { width: 100%; }
    .view-tab { flex: 1; text-align: center; }
    .admin-tabs { width: 100%; }
    .admin-tab { flex: 1; text-align: center; }
  }
</style>
</head>
<body>

<div id="loginScreen" class="login-wrap">
  <div class="login-card">
    <div class="login-title">📋 新人教育進捗管理</div>
    <div class="login-sub">社員番号とパスワードでログインしてください</div>
    <div class="login-field">
      <label class="login-label">社員番号</label>
      <input type="text" id="inputStaffId" class="login-input" placeholder="例：1001" inputmode="numeric">
    </div>
    <div class="login-field">
      <label class="login-label">パスワード</label>
      <input type="password" id="inputPassword" class="login-input" placeholder="パスワード">
    </div>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">ログイン</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<div id="appScreen" style="display:none;">
  <div class="header">
    <div class="header-title">📋 <span>新人教育</span>進捗管理</div>
    <div class="header-right">
      <span id="userNameLabel" style="font-size:0.75rem;color:var(--text2);"></span>
      <span id="roleBadge" class="role-badge"></span>
      <button class="logout-btn" onclick="doLogout()">ログアウト</button>
    </div>
  </div>
  <div class="app-layout">
    <div class="sidebar" id="sidebar">
      <span class="sidebar-label">カテゴリ</span>
      <div id="sidebarItems"></div>
    </div>
    <div class="main-content">
      <div class="main" id="main">
        <div class="loading"><div class="spinner"></div>読み込み中...</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzfCUjmHmmCXSEvsPp6XvXTVVlQcqBG2pItoHBEcbzR0rFiU9ULd8ONCYZyzmJzDELuFg/exec';

let state = {
  user: null, currentTrainee: null, currentCategory: null,
  categories: [], trainees: [], data: {}, view: 'detail',
  openCategories: new Set(), adminView: 'items', staffList: null,
  adminOpenCats: null
};

const NO_CACHE = ['saveProgress','login','getProgress','getAllProgress','getTrainees',
  'getStaffList','getCategories','addItem','updateItem','deleteItem','reorderItem',
  'addCategory','addStaff','updateStaff','deleteStaff','reorderCategory',
  'saveItemOrder','saveCategoryOrder','setStaffEnabled'];
const gasCache = {};

function callGAS(func, params) {
  const cacheKey = func + (params ? JSON.stringify(params) : '');
  if (NO_CACHE.indexOf(func) === -1 && gasCache[cacheKey]) return Promise.resolve(gasCache[cacheKey]);
  return new Promise(function(resolve, reject) {
    const callbackName = 'cb_' + func + '_' + Date.now();
    const script = document.createElement('script');
    const url = GAS_URL + '?func=' + func + '&callback=' + callbackName +
      (params ? '&params=' + encodeURIComponent(JSON.stringify(params)) : '');
    var timer = setTimeout(function() {
      delete window[callbackName];
      if (script.parentNode) script.parentNode.removeChild(script);
      reject(new Error('タイムアウト'));
    }, 30000);
    window[callbackName] = function(data) {
      clearTimeout(timer);
      delete window[callbackName];
      if (script.parentNode) script.parentNode.removeChild(script);
      if (data.error) reject(new Error(data.error));
      else { if (NO_CACHE.indexOf(func) === -1) gasCache[cacheKey] = data.result; resolve(data.result); }
    };
    script.onerror = function() { clearTimeout(timer); delete window[callbackName]; reject(new Error('通信エラー')); };
    script.src = url;
    document.body.appendChild(script);
  });
}

function doLogin() {
  const staffId = document.getElementById('inputStaffId').value.trim();
  const password = document.getElementById('inputPassword').value.trim();
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('loginError');
  if (!staffId || !password) { err.textContent = '社員番号とパスワードを入力してください'; return; }
  btn.disabled = true; btn.textContent = 'ログイン中...'; err.textContent = '';
  callGAS('login', { staffId, password })
    .then(function(result) {
      btn.disabled = false; btn.textContent = 'ログイン';
      if (result.success) {
        state.user = result;
        localStorage.setItem('loginUser', JSON.stringify(result));
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('appScreen').style.display = 'block';
        initApp();
      } else { err.textContent = result.message || '社員番号またはパスワードが違います'; }
    })
    .catch(function(e) { btn.disabled = false; btn.textContent = 'ログイン'; err.textContent = 'エラー: ' + e.message; });
}

document.getElementById('inputPassword').addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });

function doLogout() {
  localStorage.removeItem('loginUser');
  state = { user: null, currentTrainee: null, currentCategory: null, categories: [], trainees: [], data: {}, view: 'detail', openCategories: new Set(), adminView: 'items', staffList: null, adminOpenCats: null };
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('inputStaffId').value = '';
  document.getElementById('inputPassword').value = '';
  document.getElementById('loginError').textContent = '';
}

function getAssignedTrainee(trainees) {
  const assignedId = state.user.traineeId ? String(state.user.traineeId).split(',')[0].trim() : '';
  if (assignedId) {
    const found = trainees.find(function(t) { return t.traineeId === assignedId; });
    if (found) return found.traineeId;
  }
  return trainees.length > 0 ? trainees[0].traineeId : null;
}

function initApp() {
  const roleLabels = { '新スタッフ': '新スタッフ', 'トレーナー': 'トレーナー', '店長': '店長', '管理職': '管理職' };
  const roleClasses = { '新スタッフ': 'role-new', 'トレーナー': 'role-trainer', '店長': 'role-manager', '管理職': 'role-manager' };
  document.getElementById('userNameLabel').textContent = state.user.name;
  document.getElementById('roleBadge').textContent = roleLabels[state.user.role] || state.user.role;
  document.getElementById('roleBadge').className = 'role-badge ' + (roleClasses[state.user.role] || 'role-trainer');
  const role = state.user.role;
  if (role === '新スタッフ') {
    state.trainees = [{ traineeId: state.user.traineeId, name: state.user.name }];
    state.currentTrainee = state.user.traineeId;
    Promise.all([callGAS('getCategories'), callGAS('getProgress', { traineeId: state.user.traineeId })])
      .then(function(results) { state.categories = results[0]; if (state.categories.length > 0) state.currentCategory = state.categories[0].id; state.data[state.user.traineeId] = results[1]; render(); }).catch(showError);
  } else if (role === '管理職' || role === '店長') {
    Promise.all([callGAS('getCategories'), callGAS('getTrainees'), callGAS('getAllProgress')])
      .then(function(results) { state.categories = results[0]; if (state.categories.length > 0) state.currentCategory = state.categories[0].id; state.trainees = results[1]; state.data = results[2]; if (state.trainees.length > 0) state.currentTrainee = getAssignedTrainee(state.trainees); render(); }).catch(showError);
  } else {
    Promise.all([callGAS('getCategories'), callGAS('getTrainees')])
      .then(function(results) { state.categories = results[0]; if (state.categories.length > 0) state.currentCategory = state.categories[0].id; state.trainees = results[1]; if (state.trainees.length > 0) { state.currentTrainee = getAssignedTrainee(state.trainees); return callGAS('getProgress', { traineeId: state.currentTrainee }).then(function(progress) { state.data[state.currentTrainee] = progress; render(); }); } else { render(); } }).catch(showError);
  }
}

function loadProgressData(traineeId) {
  return callGAS('getProgress', { traineeId }).then(function(progress) { state.data[traineeId] = progress; render(); });
}

function getRecord(traineeId, itemId) {
  if (!state.data[traineeId]) state.data[traineeId] = {};
  if (!state.data[traineeId][itemId]) state.data[traineeId][itemId] = { taughtDate: '', grade: '', retaughtDate: '', grade2: '' };
  return state.data[traineeId][itemId];
}

function getCategoryProgress(traineeId, catId) {
  const cat = state.categories.find(function(c) { return c.id === catId; });
  if (!cat) return { taught: 0, total: 0 };
  let taught = 0;
  cat.items.forEach(function(item) { if (getRecord(traineeId, item.id).taughtDate) taught++; });
  return { taught, total: cat.items.length };
}

function getTotalProgress(traineeId) {
  let taught = 0, total = 0;
  state.categories.forEach(function(cat) { const p = getCategoryProgress(traineeId, cat.id); taught += p.taught; total += p.total; });
  return { taught, total };
}

function render() { renderSidebar(); renderMain(); }

function renderSidebar() {
  const el = document.getElementById('sidebarItems');
  if (!el) return;
  if (state.user.role === '管理職' && state.view === 'admin') {
    el.innerHTML = '<div class="sidebar-item" onclick="setView(\'detail\')" style="color:var(--accent2)">← 進捗管理に戻る</div>';
    return;
  }
  if (!state.currentTrainee) return;
  el.innerHTML = state.categories.map(function(cat) {
    const p = getCategoryProgress(state.currentTrainee, cat.id);
    return '<div class="sidebar-item ' + (state.currentCategory === cat.id ? 'active' : '') + '" onclick="selectCategory(\'' + cat.id + '\')">' +
      '<div class="sidebar-dot"></div><span style="flex:1">' + cat.name + '</span>' +
      '<span class="sidebar-progress">' + p.taught + '/' + p.total + '</span></div>';
  }).join('');
}

function renderMain() {
  const role = state.user.role;
  const isManager = role === '店長' || role === '管理職';
  const isAdmin = role === '管理職';
  const isNew = role === '新スタッフ';
  const canEdit = role === 'トレーナー' || role === '店長';
  let html = '';

  if (isAdmin && state.view === 'admin') {
    document.getElementById('main').innerHTML = renderAdmin();
    initDrag();
    return;
  }

  if (!isNew) {
    html += '<div class="trainee-bar"><span class="trainee-label">新スタッフ：</span>';
    state.trainees.forEach(function(t) { html += '<button class="trainee-btn ' + (state.currentTrainee === t.traineeId ? 'active' : '') + '" onclick="selectTrainee(\'' + t.traineeId + '\')">' + t.name + '</button>'; });
    html += '</div>';
  }

  if (isManager) {
    html += '<div class="view-tabs">';
    html += '<button class="view-tab ' + (state.view === 'overview' ? 'active' : '') + '" onclick="setView(\'overview\')">📊 全体一覧</button>';
    html += '<button class="view-tab ' + (state.view === 'detail' ? 'active' : '') + '" onclick="setView(\'detail\')">📋 詳細</button>';
    if (isAdmin) html += '<button class="view-tab ' + (state.view === 'admin' ? 'active' : '') + '" onclick="setView(\'admin\')">⚙️ 管理</button>';
    html += '</div>';
  }

  if (isManager && state.view === 'overview') { html += renderOverview(); } else { html += renderDetail(canEdit); }
  document.getElementById('main').innerHTML = html;
}

function renderAdmin() {
  let html = '<button class="back-btn" onclick="setView(\'detail\')">← 進捗管理に戻る</button>';
  html += '<div class="admin-tabs">';
  html += '<button class="admin-tab ' + (state.adminView === 'items' ? 'active' : '') + '" onclick="setAdminView(\'items\')">📚 教育項目</button>';
  html += '<button class="admin-tab ' + (state.adminView === 'staff' ? 'active' : '') + '" onclick="setAdminView(\'staff\')">👥 スタッフ</button>';
  html += '</div>';
  if (state.adminView === 'items') { html += renderAdminItems(); } else { html += renderAdminStaff(); }
  return html;
}

function renderAdminItems() {
  let html = '';
  html += '<div class="admin-section"><div class="admin-section-head"><span class="admin-section-title">カテゴリ追加</span></div>';
  html += '<div class="admin-form"><input class="admin-input" id="newCategoryName" placeholder="新しいカテゴリ名" style="flex:1"><button class="admin-btn primary" onclick="doAddCategory()">追加</button></div></div>';
  html += '<div id="cat-list">';
  state.categories.forEach(function(cat, catIdx) {
    const isOpen = state.adminOpenCats && state.adminOpenCats.has(cat.id);
    html += '<div class="admin-section" data-cat-id="' + cat.id + '" data-cat-idx="' + catIdx + '">';
    html += '<div class="admin-section-head" style="cursor:pointer" onclick="toggleAdminCat(\'' + cat.id + '\')">';
    html += '<span class="admin-section-title"><span class="drag-handle cat-drag-handle" onclick="event.stopPropagation()" title="ドラッグしてカテゴリを並び替え">⠿</span> ';
    html += '<span class="category-chevron ' + (isOpen ? 'open' : '') + '" style="font-size:0.7rem;margin-right:4px">▼</span>';
    html += '📁 ' + cat.name + '（' + cat.items.length + '項目）</span></div>';
    if (isOpen) {
      html += '<div class="item-list" data-cat-id="' + cat.id + '">';
      cat.items.forEach(function(item) {
        html += '<div class="admin-item-row" data-item-id="' + item.id + '" data-cat-id="' + cat.id + '" draggable="true">';
        html += '<span class="drag-handle" title="ドラッグして並び替え">⠿</span>';
        html += '<span class="admin-item-name" id="item-name-' + item.id + '">' + item.name + '</span>';
        html += '<button class="admin-btn" onclick="startEditItem(\'' + item.id + '\',\'' + item.name.replace(/'/g, "\\'") + '\')">編集</button>';
        html += '<button class="admin-btn danger" onclick="doDeleteItem(\'' + item.id + '\',\'' + item.name.replace(/'/g, "\\'") + '\')">削除</button>';
        html += '</div>';
      });
      html += '</div>';
      html += '<div class="admin-form"><input class="admin-input" id="newItem-' + cat.id + '" placeholder="新しい項目名" style="flex:1"><button class="admin-btn primary" onclick="doAddItem(\'' + cat.id + '\')">追加</button></div>';
    }
    html += '</div>';
  });
  html += '</div>';
  return html;
}

function toggleAdminCat(catId) {
  if (!state.adminOpenCats) state.adminOpenCats = new Set();
  state.adminOpenCats.has(catId) ? state.adminOpenCats.delete(catId) : state.adminOpenCats.add(catId);
  document.getElementById('main').innerHTML = renderAdmin();
  initDrag();
}

function initDrag() {
  document.querySelectorAll('.admin-item-row[draggable]').forEach(function(row) {
    row.addEventListener('dragstart', function(e) { e.dataTransfer.setData('type', 'item'); e.dataTransfer.setData('itemId', row.dataset.itemId); e.dataTransfer.setData('catId', row.dataset.catId); row.classList.add('dragging'); });
    row.addEventListener('dragend', function() { row.classList.remove('dragging'); document.querySelectorAll('.drag-over-top,.drag-over-bottom').forEach(function(el) { el.classList.remove('drag-over-top','drag-over-bottom'); }); });
    row.addEventListener('dragover', function(e) { e.preventDefault(); document.querySelectorAll('.drag-over-top,.drag-over-bottom').forEach(function(el) { el.classList.remove('drag-over-top','drag-over-bottom'); }); const rect = row.getBoundingClientRect(); if (e.clientY < rect.top + rect.height / 2) { row.classList.add('drag-over-top'); } else { row.classList.add('drag-over-bottom'); } });
    row.addEventListener('dragleave', function() { row.classList.remove('drag-over-top','drag-over-bottom'); });
    row.addEventListener('drop', function(e) {
      e.preventDefault(); row.classList.remove('drag-over-top','drag-over-bottom');
      const draggedItemId = e.dataTransfer.getData('itemId'); const draggedCatId = e.dataTransfer.getData('catId');
      const targetItemId = row.dataset.itemId; const targetCatId = row.dataset.catId;
      if (draggedItemId === targetItemId) return;
      const insertBefore = e.clientY < row.getBoundingClientRect().top + row.getBoundingClientRect().height / 2;
      const srcCat = state.categories.find(function(c) { return c.id === draggedCatId; });
      const tgtCat = state.categories.find(function(c) { return c.id === targetCatId; });
      if (!srcCat || !tgtCat) return;
      const draggedItem = srcCat.items.find(function(i) { return i.id === draggedItemId; });
      if (!draggedItem) return;
      srcCat.items = srcCat.items.filter(function(i) { return i.id !== draggedItemId; });
      const tgtIdx = tgtCat.items.findIndex(function(i) { return i.id === targetItemId; });
      tgtCat.items.splice(insertBefore ? tgtIdx : tgtIdx + 1, 0, draggedItem);
      document.getElementById('main').innerHTML = renderAdmin(); initDrag();
      if (draggedCatId === targetCatId) saveItemOrder(targetCatId);
    });
  });

  document.querySelectorAll('.cat-drag-handle').forEach(function(handle) {
    const sec = handle.closest('.admin-section');
    if (!sec) return;
    handle.setAttribute('draggable', 'true');
    handle.addEventListener('dragstart', function(e) { e.dataTransfer.setData('type', 'category'); e.dataTransfer.setData('catId', sec.dataset.catId); sec.classList.add('dragging'); e.stopPropagation(); });
    handle.addEventListener('dragend', function() { sec.classList.remove('dragging'); document.querySelectorAll('.cat-drop-line').forEach(function(el) { el.remove(); }); });
  });

  document.querySelectorAll('#cat-list > .admin-section').forEach(function(sec) {
    sec.addEventListener('dragover', function(e) {
      e.preventDefault();
      document.querySelectorAll('.cat-drop-line').forEach(function(el) { el.remove(); });
      const rect = sec.getBoundingClientRect();
      const line = document.createElement('div');
      line.className = 'cat-drop-line';
      line.style.cssText = 'height:3px;background:var(--accent);margin:0 8px;border-radius:2px;';
      if (e.clientY < rect.top + rect.height / 2) { sec.parentNode.insertBefore(line, sec); } else { sec.parentNode.insertBefore(line, sec.nextSibling); }
    });
    sec.addEventListener('drop', function(e) {
      e.preventDefault(); e.stopPropagation();
      document.querySelectorAll('.cat-drop-line').forEach(function(el) { el.remove(); });
      const draggedCatId = e.dataTransfer.getData('catId'); const targetCatId = sec.dataset.catId;
      if (!draggedCatId || draggedCatId === targetCatId) return;
      const insertBefore = e.clientY < sec.getBoundingClientRect().top + sec.getBoundingClientRect().height / 2;
      const draggedIdx = state.categories.findIndex(function(c) { return c.id === draggedCatId; });
      if (draggedIdx === -1) return;
      const dragged = state.categories.splice(draggedIdx, 1)[0];
      const newTargetIdx = state.categories.findIndex(function(c) { return c.id === targetCatId; });
      state.categories.splice(insertBefore ? newTargetIdx : newTargetIdx + 1, 0, dragged);
      document.getElementById('main').innerHTML = renderAdmin(); initDrag(); saveCategoryOrder();
    });
  });

  const catList = document.getElementById('cat-list');
  if (catList) {
    catList.addEventListener('dragleave', function(e) { if (!catList.contains(e.relatedTarget)) { document.querySelectorAll('.cat-drop-line').forEach(function(el) { el.remove(); }); } });
  }
}

function saveItemOrder(catId) {
  const cat = state.categories.find(function(c) { return c.id === catId; });
  if (!cat) return;
  callGAS('saveItemOrder', { catId, orderedIds: cat.items.map(function(i) { return i.id; }) })
    .catch(function(e) { showToast('順番の保存失敗: ' + e.message, 'error'); });
}

function saveCategoryOrder() {
  callGAS('saveCategoryOrder', { orderedIds: state.categories.map(function(c) { return c.id; }) })
    .catch(function(e) { showToast('カテゴリ順の保存失敗: ' + e.message, 'error'); });
}

function renderAdminStaff() {
  if (!state.staffList) {
    callGAS('getStaffList').then(function(list) { state.staffList = list; document.getElementById('main').innerHTML = renderAdmin(); }).catch(showError);
    return '<div class="loading"><div class="spinner"></div>読み込み中...</div>';
  }
  const roleColors = { '新スタッフ': 'background:rgba(22,163,74,0.1);color:var(--green)', 'トレーナー': 'background:rgba(37,99,235,0.1);color:var(--accent)', '店長': 'background:rgba(124,58,237,0.1);color:var(--accent2)', '管理職': 'background:rgba(124,58,237,0.1);color:var(--accent2)' };
  const sortedStaff = state.staffList.slice().sort(function(a, b) { return String(a.staffId).localeCompare(String(b.staffId), undefined, { numeric: true }); });
  let html = '<div class="admin-section"><div class="admin-section-head"><span class="admin-section-title">スタッフ一覧</span></div>';
  html += '<div style="overflow-x:auto"><table class="staff-table"><thead><tr><th>種別</th><th>社員番号</th><th>氏名</th><th>担当新人ID</th><th>操作</th></tr></thead><tbody>';
  sortedStaff.forEach(function(s) {
    const isActive = s.active === true;
    const isEnabled = s.enabled !== false;
    html += '<tr style="' + (!isEnabled ? 'opacity:0.5' : '') + '">';
    html += '<td><span style="' + (roleColors[s.role]||'') + ';border-radius:10px;padding:2px 8px;font-size:0.7rem;font-weight:500;white-space:nowrap;">' + s.role + '</span></td>';
    html += '<td style="color:var(--text2);font-size:0.8rem">' + s.staffId + '</td>';
    html += '<td style="font-weight:500">' + s.name + (isEnabled ? '' : ' <span style="font-size:0.7rem;color:var(--text3)">[無効]</span>') + '</td>';
    html += '<td style="font-size:0.8rem;color:var(--text3)">' + (s.traineeId || '—') + '</td>';
    html += '<td><div class="btn-group">';
    html += '<button class="admin-btn" onclick="startEditStaff(\'' + s.staffId + '\')">編集</button>';
    if (s.role === '新スタッフ') { html += '<button class="admin-btn ' + (isActive ? 'success' : '') + '" onclick="doToggleActive(\'' + s.staffId + '\')">' + (isActive ? '表示中' : '非表示') + '</button>'; }
    html += '<button class="admin-btn ' + (isEnabled ? 'danger' : 'success') + '" onclick="doToggleEnabled(\'' + s.staffId + '\')">' + (isEnabled ? '無効化' : '有効化') + '</button>';
    html += '<button class="admin-btn danger" onclick="doDeleteStaff(\'' + s.staffId + '\',\'' + s.name.replace(/'/g, "\\'") + '\')">削除</button>';
    html += '</div></td></tr>';
  });
  html += '</tbody></table></div></div>';
  html += '<div class="admin-section"><div class="admin-section-head"><span class="admin-section-title">スタッフ追加</span></div>';
  html += '<div class="admin-form" style="flex-direction:column;gap:10px;">';
  html += '<div style="display:flex;gap:8px;flex-wrap:wrap;"><input class="admin-input" id="newStaffId" placeholder="社員番号" style="width:120px"><input class="admin-input" id="newStaffPass" placeholder="パスワード" style="width:140px"><input class="admin-input" id="newStaffName" placeholder="氏名" style="flex:1;min-width:120px"></div>';
  html += '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-start;"><select class="admin-select" id="newStaffRole" onchange="updateTraineeIdHint()"><option value="新スタッフ">新スタッフ</option><option value="トレーナー">トレーナー</option><option value="店長">店長</option><option value="管理職">管理職</option></select>';
  html += '<div style="flex:1;min-width:160px;"><input class="admin-input" id="newStaffTraineeId" placeholder="新人ID（例：trainee001）" style="width:100%"><div class="admin-hint" id="traineeIdHint">新スタッフ：本人のID / トレーナー・店長：担当する新スタッフのID</div></div>';
  html += '<input class="admin-input" id="newStaffYear" placeholder="入社年度" style="width:100px" type="number"></div>';
  html += '<button class="admin-btn primary" onclick="doAddStaff()" style="align-self:flex-start">追加</button></div></div>';
  return html;
}

// ===== 管理職操作 =====
function setAdminView(v) { state.adminView = v; state.staffList = null; document.getElementById('main').innerHTML = renderAdmin(); if (v === 'items') initDrag(); }
function updateTraineeIdHint() {
  const role = document.getElementById('newStaffRole').value;
  const hint = document.getElementById('traineeIdHint');
  const input = document.getElementById('newStaffTraineeId');
  if (!hint || !input) return;
  if (role === '新スタッフ') { hint.textContent = '新スタッフ本人のID（例：trainee001）'; input.placeholder = '新人ID（例：trainee001）'; }
  else if (role === 'トレーナー' || role === '店長') { hint.textContent = '担当する新スタッフのID（例：trainee001）'; input.placeholder = '担当新人ID（例：trainee001）'; }
  else { hint.textContent = '不要な場合は空白のままでOK'; input.placeholder = '担当新人ID（任意）'; }
}

function doAddCategory() {
  const name = document.getElementById('newCategoryName').value.trim();
  if (!name) return;
  state.categories.push({ id: name, name: name, items: [] });
  document.getElementById('main').innerHTML = renderAdmin(); initDrag();
  showToast('カテゴリを追加しました', 'success');
  callGAS('addCategory', { categoryName: name }).catch(function(e) { showToast('保存失敗: ' + e.message, 'error'); });
}

function doAddItem(categoryId) {
  const input = document.getElementById('newItem-' + categoryId);
  const name = input ? input.value.trim() : '';
  if (!name) return;
  const tempId = 'temp_' + Date.now();
  const cat = state.categories.find(function(c) { return c.id === categoryId; });
  if (cat) cat.items.push({ id: tempId, name: name });
  document.getElementById('main').innerHTML = renderAdmin(); initDrag();
  showToast('項目を追加しました', 'success');
  callGAS('addItem', { category: categoryId, itemName: name }).then(function(result) {
    if (result && result.itemId) { const c = state.categories.find(function(c) { return c.id === categoryId; }); if (c) { const item = c.items.find(function(i) { return i.id === tempId; }); if (item) item.id = result.itemId; } }
  }).catch(function(e) { showToast('保存失敗: ' + e.message, 'error'); });
}

function startEditItem(itemId, currentName) {
  const span = document.getElementById('item-name-' + itemId);
  if (!span) return;
  const editBtn = span.nextElementSibling;
  span.innerHTML = '<input class="admin-input" id="edit-item-' + itemId + '" value="' + currentName + '" style="width:100%">';
  editBtn.textContent = '保存';
  editBtn.onclick = function() { doUpdateItem(itemId); };
}

function doUpdateItem(itemId) {
  const input = document.getElementById('edit-item-' + itemId);
  const name = input ? input.value.trim() : '';
  if (!name) return;
  state.categories.forEach(function(cat) { cat.items.forEach(function(item) { if (item.id === itemId) item.name = name; }); });
  document.getElementById('main').innerHTML = renderAdmin(); initDrag();
  showToast('更新しました', 'success');
  callGAS('updateItem', { itemId, itemName: name }).catch(function(e) { showToast('保存失敗: ' + e.message, 'error'); });
}

function doDeleteItem(itemId, itemName) {
  if (!confirm('「' + itemName + '」を削除しますか？')) return;
  state.categories.forEach(function(cat) { cat.items = cat.items.filter(function(item) { return item.id !== itemId; }); });
  document.getElementById('main').innerHTML = renderAdmin(); initDrag();
  showToast('削除しました', 'success');
  callGAS('deleteItem', { itemId }).catch(function(e) { showToast('保存失敗: ' + e.message, 'error'); });
}

function doAddStaff() {
  const staffId = document.getElementById('newStaffId').value.trim();
  const password = document.getElementById('newStaffPass').value.trim();
  const name = document.getElementById('newStaffName').value.trim();
  const role = document.getElementById('newStaffRole').value;
  const traineeId = document.getElementById('newStaffTraineeId').value.trim();
  const year = document.getElementById('newStaffYear').value.trim();
  if (!staffId || !password || !name) { showToast('社員番号・パスワード・氏名は必須です', 'error'); return; }
  if (state.staffList) state.staffList.push({ staffId, name, role, traineeId, year, active: role === '新スタッフ', enabled: true });
  document.getElementById('main').innerHTML = renderAdmin();
  showToast('スタッフを追加しました', 'success');
  callGAS('addStaff', { staffId, password, name, role, traineeId, year }).catch(function(e) { showToast('保存失敗: ' + e.message, 'error'); });
}

function startEditStaff(staffId) {
  const s = state.staffList.find(function(x) { return x.staffId === staffId; });
  if (!s) return;
  const roleHint = s.role === '新スタッフ' ? '本人のID' : (s.role === 'トレーナー' || s.role === '店長') ? '担当新人ID' : '担当ID（任意）';
  const modal = document.createElement('div');
  modal.id = 'editStaffModal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px';
  modal.innerHTML = '<div style="background:var(--surface);border-radius:12px;padding:24px;width:100%;max-width:480px;box-shadow:0 8px 32px rgba(0,0,0,0.2)">' +
    '<div style="font-weight:700;font-size:1rem;margin-bottom:16px">スタッフ編集（' + s.staffId + '）</div>' +
    '<div style="display:flex;flex-direction:column;gap:10px">' +
    '<div style="display:flex;gap:8px;align-items:center"><label style="font-size:0.75rem;color:var(--text2);width:80px;flex-shrink:0">氏名</label><input class="admin-input" id="es-name" value="' + s.name + '" style="flex:1"></div>' +
    '<div style="display:flex;gap:8px;align-items:center"><label style="font-size:0.75rem;color:var(--text2);width:80px;flex-shrink:0">役職</label><select class="admin-select" id="es-role" style="flex:1"><option value="新スタッフ"' + (s.role==='新スタッフ'?' selected':'') + '>新スタッフ</option><option value="トレーナー"' + (s.role==='トレーナー'?' selected':'') + '>トレーナー</option><option value="店長"' + (s.role==='店長'?' selected':'') + '>店長</option><option value="管理職"' + (s.role==='管理職'?' selected':'') + '>管理職</option></select></div>' +
    '<div style="display:flex;gap:8px;align-items:center"><label style="font-size:0.75rem;color:var(--text2);width:80px;flex-shrink:0">' + roleHint + '</label><input class="admin-input" id="es-trainee" value="' + (s.traineeId||'') + '" style="flex:1"></div>' +
    '<div style="display:flex;gap:8px;align-items:center"><label style="font-size:0.75rem;color:var(--text2);width:80px;flex-shrink:0">入社年度</label><input class="admin-input" id="es-year" value="' + (s.year||'') + '" type="number" style="flex:1"></div>' +
    '</div>' +
    '<div style="display:flex;gap:8px;margin-top:20px;justify-content:flex-end"><button class="admin-btn" onclick="document.getElementById(\'editStaffModal\').remove()">キャンセル</button><button class="admin-btn primary" onclick="doUpdateStaff(\'' + s.staffId + '\')">保存</button></div></div>';
  document.body.appendChild(modal);
  modal.addEventListener('click', function(e) { if (e.target === modal) modal.remove(); });
}

function doUpdateStaff(staffId) {
  const s = state.staffList.find(function(x) { return x.staffId === staffId; });
  const name = document.getElementById('es-name').value.trim();
  const role = document.getElementById('es-role').value;
  const traineeId = document.getElementById('es-trainee').value.trim();
  const year = document.getElementById('es-year').value.trim();
  const active = s ? s.active : false;
  if (!name) { showToast('氏名は必須です', 'error'); return; }
  const modal = document.getElementById('editStaffModal');
  if (modal) modal.remove();
  if (s) { s.name = name; s.role = role; s.traineeId = traineeId; s.year = year; }
  document.getElementById('main').innerHTML = renderAdmin();
  showToast('更新しました', 'success');
  callGAS('updateStaff', { staffId, name, role, traineeId, year, active, enabled: s ? s.enabled !== false : true })
    .catch(function(e) { showToast('保存失敗: ' + e.message, 'error'); });
}

function doToggleActive(staffId) {
  const s = state.staffList.find(function(x) { return x.staffId === staffId; });
  if (!s) return;
  const newActive = !(s.active === true);
  s.active = newActive;
  document.getElementById('main').innerHTML = renderAdmin();
  showToast(newActive ? '表示中に変更しました' : '非表示に変更しました', 'success');
  callGAS('updateStaff', { staffId, name: s.name, role: s.role, traineeId: s.traineeId, year: s.year, active: newActive, enabled: s.enabled !== false })
    .catch(function(e) { showToast('保存失敗: ' + e.message, 'error'); });
}

function doToggleEnabled(staffId) {
  const s = state.staffList.find(function(x) { return x.staffId === staffId; });
  if (!s) return;
  const newEnabled = !(s.enabled !== false);
  s.enabled = newEnabled;
  document.getElementById('main').innerHTML = renderAdmin();
  showToast(newEnabled ? '有効化しました' : '無効化しました', newEnabled ? 'success' : 'error');
  callGAS('setStaffEnabled', { staffId: staffId, enabled: newEnabled })
    .catch(function(e) { showToast('保存失敗: ' + e.message, 'error'); });
}

function doDeleteStaff(staffId, staffName) {
  if (!confirm('「' + staffName + '」を削除しますか？\n※この操作は取り消せません。')) return;
  if (state.staffList) state.staffList = state.staffList.filter(function(x) { return x.staffId !== staffId; });
  document.getElementById('main').innerHTML = renderAdmin();
  showToast('削除しました', 'success');
  callGAS('deleteStaff', { staffId }).catch(function(e) { showToast('保存失敗: ' + e.message, 'error'); });
}

function renderOverview() {
  let html = '<div class="overview-grid">';
  state.trainees.forEach(function(t) {
    const total = getTotalProgress(t.traineeId);
    const pct = total.total ? Math.round(total.taught / total.total * 100) : 0;
    html += '<div class="overview-card"><div class="overview-card-name">' + t.name + '<span class="overview-pct-big">' + pct + '%</span></div>';
    html += '<div class="progress-wrap" style="margin-bottom:10px"><div class="progress-fill" style="width:' + pct + '%"></div></div>';
    html += '<div class="overview-sections">';
    state.categories.forEach(function(cat) {
      const p = getCategoryProgress(t.traineeId, cat.id);
      const cpct = p.total ? Math.round(p.taught / p.total * 100) : 0;
      html += '<div class="overview-row"><span class="overview-name">' + cat.name + '</span><div class="overview-bar"><div class="overview-bar-fill" style="width:' + cpct + '%"></div></div><span class="overview-pct">' + cpct + '%</span></div>';
    });
    html += '</div></div>';
  });
  return html + '</div>';
}

function renderDetail(canEdit) {
  if (!state.currentTrainee) return '<div class="loading">新スタッフが登録されていません</div>';
  const traineeId = state.currentTrainee;
  const total = getTotalProgress(traineeId);
  const pct = total.total ? Math.round(total.taught / total.total * 100) : 0;
  const traineeName = (state.trainees.find(function(t) { return t.traineeId === traineeId; }) || {}).name || '';
  const gradeColor = { A: 'active-A', B: 'active-B', C: 'active-C', D: 'active-D' };

  let html = '<div class="section-header"><div class="section-title">' + traineeName + ' の進捗</div>';
  html += '<div class="section-stats"><div class="stat-item"><div class="stat-num">' + pct + '%</div><div class="stat-label">指導済み</div></div>';
  html += '<div class="stat-item"><div class="stat-num" style="color:var(--text2)">' + total.total + '</div><div class="stat-label">総項目</div></div></div></div>';
  html += '<div class="progress-wrap"><div class="progress-fill" style="width:' + pct + '%"></div></div>';
  html += '<div class="legend">';
  html += '<span class="legend-item"><span class="legend-dot" style="background:var(--green)"></span>A：1人で実践できる</span>';
  html += '<span class="legend-item"><span class="legend-dot" style="background:var(--accent)"></span>B：援助があれば実践できる</span>';
  html += '<span class="legend-item"><span class="legend-dot" style="background:var(--yellow)"></span>C：練習が必要</span>';
  html += '<span class="legend-item"><span class="legend-dot" style="background:var(--red)"></span>D：再度説明が必要</span>';
  html += '</div>';

  state.categories.forEach(function(cat) {
    const isOpen = state.openCategories.has(cat.id);
    const p = getCategoryProgress(traineeId, cat.id);
    const cpct = p.total ? Math.round(p.taught / p.total * 100) : 0;
    html += '<div class="category-block"><div class="category-head" onclick="toggleCategory(\'' + cat.id + '\')">';
    html += '<div class="category-head-left"><span class="category-chevron ' + (isOpen ? 'open' : '') + '">▼</span>';
    html += '<span class="category-name">' + cat.name + '</span><span class="category-count">' + p.taught + '/' + p.total + '</span></div>';
    html += '<div style="display:flex;align-items:center;gap:8px"><div class="category-mini-bar"><div class="category-mini-fill" style="width:' + cpct + '%"></div></div>';
    html += '<span style="font-size:0.7rem;color:var(--text3)">' + cpct + '%</span></div></div>';

    if (isOpen) {
      html += '<div class="item-row-header"><div>業務内容</div><div>指導日 / 習得度①</div><div>再指導日 / 習得度②</div><div>状態</div></div>';
      cat.items.forEach(function(item) {
        const rec = getRecord(traineeId, item.id);
        const status = rec.retaughtDate ? 'done' : rec.taughtDate ? 'taught' : 'none';
        const statusLabel = status === 'done' ? '再指導済み' : status === 'taught' ? '指導済み' : '';
        const statusStyle = status === 'done'
          ? 'background:rgba(124,58,237,0.1);color:var(--accent2);border:1px solid rgba(124,58,237,0.2);'
          : 'background:rgba(37,99,235,0.08);color:var(--accent);border:1px solid rgba(37,99,235,0.15);';

        html += '<div class="item-row"><div class="item-name-wrap"><span class="item-name">' + item.name + '</span></div>';
        html += '<div class="item-checks">';
        html += '<div class="check-col">';
        if (canEdit) {
          html += '<label class="taught-check ' + (rec.taughtDate ? 'checked' : '') + '" onclick="toggleTaught(\'' + traineeId + '\',\'' + item.id + '\')">';
          html += '<div class="check-box">' + (rec.taughtDate ? '✓' : '') + '</div>';
          html += '<span class="taught-date-label">' + (rec.taughtDate || '未指導') + '</span></label>';
          html += '<div class="grade-select">';
          ['A','B','C','D'].forEach(function(g) { html += '<button class="grade-btn ' + (rec.grade === g ? gradeColor[g] : '') + '" onclick="updateField(\'' + traineeId + '\',\'' + item.id + '\',\'grade\',\'' + (rec.grade === g ? '' : g) + '\')">' + g + '</button>'; });
          html += '</div>';
        } else {
          html += '<div style="font-size:0.85rem;color:' + (rec.taughtDate ? 'var(--accent)' : 'var(--text3)') + '">' + (rec.taughtDate || '—') + '</div>';
          html += '<div style="font-weight:700;font-size:0.95rem;color:' + (rec.grade === 'A' ? 'var(--green)' : rec.grade === 'B' ? 'var(--accent)' : rec.grade === 'C' ? 'var(--yellow)' : rec.grade === 'D' ? 'var(--red)' : 'var(--text3)') + '">' + (rec.grade || '—') + '</div>';
        }
        html += '</div>';
        html += '<div class="check-col">';
        if (canEdit) {
          html += '<label class="taught-check retaught ' + (rec.retaughtDate ? 'checked' : '') + '" onclick="toggleRetaught(\'' + traineeId + '\',\'' + item.id + '\')">';
          html += '<div class="check-box" style="' + (rec.retaughtDate ? 'background:var(--accent2);border-color:var(--accent2)' : '') + '">' + (rec.retaughtDate ? '✓' : '') + '</div>';
          html += '<span class="taught-date-label" style="' + (rec.retaughtDate ? 'color:var(--accent2)' : '') + '">' + (rec.retaughtDate || '未実施') + '</span></label>';
          html += '<div class="grade-select">';
          ['A','B','C','D'].forEach(function(g) { html += '<button class="grade-btn ' + (rec.grade2 === g ? gradeColor[g] : '') + '" onclick="updateField(\'' + traineeId + '\',\'' + item.id + '\',\'grade2\',\'' + (rec.grade2 === g ? '' : g) + '\')">' + g + '</button>'; });
          html += '</div>';
        } else {
          html += '<div style="font-size:0.85rem;color:' + (rec.retaughtDate ? 'var(--accent2)' : 'var(--text3)') + '">' + (rec.retaughtDate || '—') + '</div>';
          html += '<div style="font-weight:700;font-size:0.95rem;color:' + (rec.grade2 === 'A' ? 'var(--green)' : rec.grade2 === 'B' ? 'var(--accent)' : rec.grade2 === 'C' ? 'var(--yellow)' : rec.grade2 === 'D' ? 'var(--red)' : 'var(--text3)') + '">' + (rec.grade2 || '—') + '</div>';
        }
        html += '</div>';
        // 状態バッジを最後の列に
        html += '<div style="display:flex;align-items:center;justify-content:center;">';
        if (statusLabel) { html += '<span class="status-badge" style="' + statusStyle + '">● ' + statusLabel + '</span>'; }
        html += '</div>';
        html += '</div></div>';
      });
    }
    html += '</div>';
  });
  return html;
}

function selectTrainee(traineeId) {
  state.currentTrainee = traineeId;
  if (!state.data[traineeId]) { document.getElementById('main').innerHTML = '<div class="loading"><div class="spinner"></div>読み込み中...</div>'; loadProgressData(traineeId); } else { render(); }
}

function selectCategory(id) {
  state.currentCategory = id; state.openCategories.add(id); render();
  setTimeout(function() { const blocks = document.querySelectorAll('.category-block'); const idx = state.categories.findIndex(function(c) { return c.id === id; }); if (blocks[idx]) blocks[idx].scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 50);
}

function toggleCategory(id) { state.openCategories.has(id) ? state.openCategories.delete(id) : state.openCategories.add(id); render(); }
function setView(v) { state.view = v; renderSidebar(); renderMain(); if (v === 'admin') setTimeout(initDrag, 50); }

function toggleTaught(traineeId, itemId) { const rec = getRecord(traineeId, itemId); const value = rec.taughtDate ? '' : todayStr(); rec.taughtDate = value; render(); saveField(traineeId, itemId, 'taughtDate', value); }
function toggleRetaught(traineeId, itemId) { const rec = getRecord(traineeId, itemId); const value = rec.retaughtDate ? '' : todayStr(); rec.retaughtDate = value; render(); saveField(traineeId, itemId, 'retaughtDate', value); }
function updateField(traineeId, itemId, field, value) { const rec = getRecord(traineeId, itemId); rec[field] = value; render(); saveField(traineeId, itemId, field, value); }

function saveField(traineeId, itemId, field, value) {
  callGAS('saveProgress', { traineeId, itemId, field, value })
    .then(function() { showToast('保存しました ✓', 'success'); })
    .catch(function(e) { showToast('保存失敗: ' + e.message, 'error'); });
}

function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + (type || 'success') + ' show';
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(function() { t.className = 'toast'; }, 2500);
}

function showError(e) {
  document.getElementById('main').innerHTML = '<div class="loading" style="color:var(--red)">エラー: ' + (e ? e.message : '不明') + '</div>';
}

(function() {
  const saved = localStorage.getItem('loginUser');
  if (saved) {
    try { state.user = JSON.parse(saved); document.getElementById('loginScreen').style.display = 'none'; document.getElementById('appScreen').style.display = 'block'; initApp(); }
    catch(e) { localStorage.removeItem('loginUser'); }
  }
})();
</script>
</body>
</html>
